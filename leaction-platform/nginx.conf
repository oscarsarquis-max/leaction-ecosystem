# =============================================================================
# Nginx — Action Hub (produção EC2)
# PanelDX usa deploy/nginx próprio — este arquivo cobre apenas o Action Hub.
#
# Instalação sugerida no Ubuntu:
#   sudo cp nginx.conf /etc/nginx/sites-available/action-hub
#   sudo ln -sf /etc/nginx/sites-available/action-hub /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (após DNS apontando para o EC2 e portas 80/443 liberadas no Security Group):
#   sudo certbot --nginx -d actionhub.com.br -d www.actionhub.com.br -d api.actionhub.com.br
# =============================================================================

upstream action_hub_frontend {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream action_hub_gateway {
    server 127.0.0.1:4001;
    keepalive 16;
}

# -----------------------------------------------------------------------------
# Action Hub — site público (Next.js)
# Domínios: actionhub.com.br, www.actionhub.com.br
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name actionhub.com.br www.actionhub.com.br;

    # >>> CERTBOT: descomente após `certbot --nginx` injetar o bloco SSL <<<
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/actionhub.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/actionhub.com.br/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # >>> CERTBOT: redirect HTTP → HTTPS (habilitar após certificados) <<<
    # if ($host = www.actionhub.com.br) {
    #     return 301 https://actionhub.com.br$request_uri;
    # }
    # return 301 https://$host$request_uri;

    client_max_body_size 10m;

    location / {
        proxy_pass http://action_hub_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# -----------------------------------------------------------------------------
# Gateway API — integração PanelDX / Mercado Pago / webhooks
# Domínio: api.actionhub.com.br
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.actionhub.com.br;

    # >>> CERTBOT: bloco SSL para api.actionhub.com.br <<<
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/api.actionhub.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.actionhub.com.br/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # >>> CERTBOT: redirect HTTP → HTTPS <<<
    # return 301 https://$host$request_uri;

    client_max_body_size 5m;

    location / {
        proxy_pass http://action_hub_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
