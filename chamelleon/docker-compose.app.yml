# Chamelleon local via Docker (sem Python/Node no host)
# Uso: docker compose -f docker-compose.app.yml up -d --build
# DB: leaction_db na rede leaction-platform_default (:5433 no host)
services:
  backend:
    image: python:3.11-slim
    container_name: chamelleon_backend
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python run.py"
    env_file:
      - ./backend/.env
    environment:
      FLASK_PORT: "5010"
      PORT: "5010"
      # Sobrescreve host do .env (127.0.0.1) para o DNS do Docker
      DATABASE_URL: postgresql://admin:password123@leaction_db:5432/chamelleon
      # Diário de Obra no host (start-diario-obra.ps1 → :6010)
      DIARIO_OBRA_API_URL: http://host.docker.internal:6010
      INTEGRATION_API_KEY: dev-gemba-integration-key
      GEMBA_WEBHOOK_API_KEY: dev-gemba-integration-key
    volumes:
      - ./backend:/app
    ports:
      - "5010:5010"
    networks:
      - leaction_net
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: chamelleon_frontend
    working_dir: /app
    command: >
      sh -c "npm config set strict-ssl false
      && npm install
      && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:5010
    volumes:
      - ./frontend:/app
      - chamelleon_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - leaction_net
    restart: unless-stopped

volumes:
  chamelleon_node_modules:

networks:
  leaction_net:
    name: leaction-platform_default
    external: true
